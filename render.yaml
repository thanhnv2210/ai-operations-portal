services:
  - type: web
    name: ai-operations-portal-api
    runtime: docker
    dockerfilePath: ./ai-service/Dockerfile
    dockerContext: ./ai-service
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: uat
      - key: ANTHROPIC_API_KEY
        sync: false          # set manually in Render dashboard — never commit secrets
      - key: ML_DB_URL
        sync: false
      - key: KEYCLOAK_DB_URL
        sync: false
      - key: CORS_ORIGINS
        value: '["*"]'       # open during initial deploy; restrict to Vercel URL after frontend is live
      - key: PORTAL_DB_URL
        value: sqlite+aiosqlite:///./portal_data.db   # query history — ephemeral SQLite, resets on redeploy
      # Optional — add later when available:
      # - key: OPENAI_API_KEY        # better RAG embeddings (text-embedding-3-small); falls back to Ollama
      # - key: LANGFUSE_PUBLIC_KEY   # LLM tracing
      # - key: LANGFUSE_SECRET_KEY   # LLM tracing
